<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Pro Calculator</title>
    <style>
        /* CSS Section */
        :root {
            --bg-color: #f4f4f9;
            --calc-bg: #ffffff;
            --text-color: #333;
            --btn-bg: #e0e0e0;
            --btn-hover: #d0d0d0;
            --accent-color: #4CAF50;
            --display-bg: #eeeeee;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --calc-bg: #1e1e1e;
            --text-color: #ffffff;
            --btn-bg: #333;
            --btn-hover: #444;
            --accent-color: #bb86fc;
            --display-bg: #2d2d2d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: 0.3s;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 320px;
            transition: width 0.3s ease;
        }

        .calculator.scientific-active {
            width: 500px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: var(--display-bg);
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            color: var(--text-color);
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .scientific-keys {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .calculator.scientific-active .buttons {
            grid-template-columns: repeat(6, 1fr);
        }

        .calculator.scientific-active .scientific-keys {
            display: grid;
            grid-column: span 2;
        }

        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: var(--btn-bg);
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        .operator { color: var(--accent-color); }
        .equals { background-color: var(--accent-color); color: white; grid-column: span 2; }
        .equals:hover { opacity: 0.9; }
        
        .mode-btn, .theme-btn {
            font-size: 0.8rem;
            padding: 5px 10px;
            background: var(--accent-color);
            color: white;
        }
    </style>
</head>
<body>

<div class="calculator" id="calc">
    <div class="top-controls">
        <button class="theme-btn" onclick="toggleTheme()">🌓 Mode</button>
        <button class="mode-btn" onclick="toggleScientific()">🔬 Sci/Norm</button>
    </div>
    
    <input type="text" id="display" disabled placeholder="0">

    <div class="buttons">
        <button class="sci-func" style="display:none" onclick="append('Math.sin(')">sin</button>
        <button class="sci-func" style="display:none" onclick="append('Math.cos(')">cos</button>
        <button class="sci-func" style="display:none" onclick="append('Math.tan(')">tan</button>
        <button class="sci-func" style="display:none" onclick="append('Math.log10(')">log</button>
        <button class="sci-func" style="display:none" onclick="append('Math.PI')">π</button>
        <button class="sci-func" style="display:none" onclick="append('Math.sqrt(')">√</button>

        <button onclick="clearDisplay()" class="operator">AC</button>
        <button onclick="deleteLast()" class="operator">DEL</button>
        <button onclick="append('%')" class="operator">%</button>
        <button onclick="append('/')" class="operator">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')" class="operator">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')" class="operator">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')" class="operator">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equals">=</button>
    </div>
</div>

<script>
    // JavaScript Section
    const display = document.getElementById('display');
    const calc = document.getElementById('calc');
    const sciButtons = document.querySelectorAll('.sci-func');

    // Display par number/operator add karne ke liye
    function append(value) {
        display.value += value;
    }

    // Screen clear karne ke liye
    function clearDisplay() {
        display.value = '';
    }

    // Ek word delete karne ke liye
    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    // Hisab lagane ke liye (Calculation)
    function calculate() {
        try {
            // Eval function code ko execute karta hai
            // Bracket close check for scientific functions
            let expression = display.value;
            let openBrackets = (expression.match(/\(/g) || []).length;
            let closeBrackets = (expression.match(/\)/g) || []).length;
            
            while(openBrackets > closeBrackets) {
                expression += ')';
                openBrackets--;
            }

            display.value = eval(expression);
        } catch (error) {
            display.value = "Error";
            setTimeout(clearDisplay, 1500);
        }
    }

    // Dark/Light Mode Toggle
    function toggleTheme() {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    // Scientific/Normal Mode Toggle
    function toggleScientific() {
        calc.classList.toggle('scientific-active');
        sciButtons.forEach(btn => {
            btn.style.display = calc.classList.contains('scientific-active') ? 'block' : 'none';
        });
    }
</script>

</body>
</html>
